name: Update IPTV Playlist

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run script to generate m3u8
        run: python gen.py

      - name: Verify file exists
        run: |
          if [ -f "astro-premier-league-2.m3u8" ]; then
            echo "File playlist.m3u8 exists."
          else
            echo "Error: playlist.m3u8 was not generated!"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add playlist.m3u8
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update m3u8 playlist" && git push)
