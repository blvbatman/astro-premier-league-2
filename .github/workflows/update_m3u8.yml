name: Update IPTV Playlist

on:
  schedule:
    # Chạy tự động mỗi 5 phút một lần
    - cron: '*/5 * * * *'
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run script to generate m3u8
        run: python gen.py  # Hoặc tên file python chứa đoạn code trên của bạn (ví dụ: gen.py)

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add astro-premier-league-2.m3u8
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update astro-premier-league-2.m3u8" && git push)
